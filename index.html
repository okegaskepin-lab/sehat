<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINZY BUGZZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            position: relative;
        }

        .rainbow-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #ff0000, #ff00ff, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);
            background-size: 400% 400%;
            animation: rainbow 3s ease infinite;
            opacity: 0.08;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            font-size: 20px;
            animation: floatUp linear infinite;
            opacity: 0.3;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 95%;
            max-width: 460px;
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.92);
            border: 2px solid #ff0000;
            border-radius: 0;
            text-align: center;
            box-shadow: 0 0 50px rgba(255,0,0,0.2), inset 0 0 50px rgba(255,0,0,0.05);
            transform: rotate(0.5deg) scale(0.98);
            animation: shake 0.5s infinite alternate;
            transition: all 0.5s ease;
        }

        .card.unlocked {
            border-color: #00ff00;
            box-shadow: 0 0 50px rgba(0,255,0,0.2), inset 0 0 50px rgba(0,255,0,0.05);
            animation: none;
            transform: scale(1);
        }

        @keyframes shake {
            0% { transform: rotate(-0.3deg) scale(0.98); }
            100% { transform: rotate(0.3deg) scale(1.01); }
        }

        .card.unlocked .title {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 40px #00ff00;
        }

        .card.unlocked .skull {
            filter: drop-shadow(0 0 40px rgba(0,255,0,0.8));
        }

        .glitch-overlay {
            position: absolute;
            inset: -2px;
            z-index: -1;
            background: transparent;
            border: 2px solid #ff0000;
            animation: glitchBorder 0.1s infinite;
            pointer-events: none;
            transition: border-color 0.5s;
        }

        .card.unlocked .glitch-overlay {
            border-color: #00ff00;
            animation: none;
        }

        @keyframes glitchBorder {
            0% { transform: translate(0); opacity: 1; }
            20% { transform: translate(-3px, 2px); opacity: 0.8; }
            40% { transform: translate(3px, -2px); opacity: 1; }
            60% { transform: translate(-2px, -3px); opacity: 0.9; }
            80% { transform: translate(2px, 3px); opacity: 1; }
            100% { transform: translate(0); opacity: 1; }
        }

        .skull-wrap {
            position: relative;
            display: inline-block;
        }

        .skull {
            font-size: 70px;
            display: block;
            filter: drop-shadow(0 0 40px rgba(255,0,0,0.8));
            animation: skullGlitch 0.3s infinite;
            transition: all 0.5s;
        }

        .card.unlocked .skull {
            animation: none;
            filter: drop-shadow(0 0 40px rgba(0,255,0,0.8));
        }

        @keyframes skullGlitch {
            0% { transform: translate(0) scale(1); }
            25% { transform: translate(-2px, 2px) scale(1.02); }
            50% { transform: translate(2px, -2px) scale(0.98); }
            75% { transform: translate(-1px, -1px) scale(1.01); }
            100% { transform: translate(0) scale(1); }
        }

        .skull-shadow {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 70px;
            color: #ff0000;
            opacity: 0.3;
            filter: blur(10px);
            animation: skullShadow 0.5s infinite alternate;
        }

        .card.unlocked .skull-shadow {
            color: #00ff00;
        }

        @keyframes skullShadow {
            0% { transform: translate(-5px, 5px); opacity: 0.2; }
            100% { transform: translate(5px, -5px); opacity: 0.5; }
        }

        .title {
            font-family: 'Press Start 2P', monospace;
            font-size: 24px;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
            letter-spacing: 4px;
            margin-top: 5px;
            animation: textFlicker 0.15s infinite alternate;
            transition: all 0.5s;
        }

        .card.unlocked .title {
            animation: none;
        }

        @keyframes textFlicker {
            0% { opacity: 1; text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }
            100% { opacity: 0.9; text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000, 0 0 60px #ff0000; }
        }

        .subtitle {
            font-size: 10px;
            color: rgba(255, 0, 0, 0.4);
            letter-spacing: 6px;
            margin-top: 8px;
            font-family: 'Press Start 2P', monospace;
            transition: color 0.5s;
        }

        .card.unlocked .subtitle {
            color: rgba(0, 255, 0, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0 12px;
        }

        .divider-line {
            flex: 1;
            height: 2px;
            background: repeating-linear-gradient(90deg, #ff0000, #ff0000 4px, transparent 4px, transparent 8px);
            transition: background 0.5s;
        }

        .card.unlocked .divider-line {
            background: repeating-linear-gradient(90deg, #00ff00, #00ff00 4px, transparent 4px, transparent 8px);
        }

        .divider-skull {
            font-size: 14px;
            color: #ff0000;
            animation: spin 2s linear infinite;
            transition: color 0.5s;
        }

        .card.unlocked .divider-skull {
            color: #00ff00;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            line-height: 2.2;
            font-family: 'Press Start 2P', monospace;
            letter-spacing: 0.5px;
        }

        .message .red {
            color: #ff0000;
            font-weight: bold;
            transition: color 0.5s;
        }

        .card.unlocked .message .red {
            color: #00ff00;
        }

        .message .blink {
            animation: blinkText 0.5s step-end infinite;
        }

        .card.unlocked .message .blink {
            animation: none;
        }

        @keyframes blinkText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 15px 0;
        }

        .status-item {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.1);
            padding: 10px 5px;
            font-family: 'Press Start 2P', monospace;
            transition: all 0.5s;
        }

        .card.unlocked .status-item {
            background: rgba(0, 255, 0, 0.05);
            border-color: rgba(0, 255, 0, 0.1);
        }

        .status-item .num {
            font-size: 16px;
            color: #ff0000;
            display: block;
            text-shadow: 0 0 20px rgba(255,0,0,0.3);
            transition: color 0.5s;
        }

        .card.unlocked .status-item .num {
            color: #00ff00;
            text-shadow: 0 0 20px rgba(0,255,0,0.3);
        }

        .status-item .label {
            font-size: 7px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            margin-top: 6px;
            display: block;
        }

        .progress-wrap {
            margin: 12px 0 15px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: rgba(255,255,255,0.2);
            font-family: 'Press Start 2P', monospace;
            margin-bottom: 5px;
            transition: color 0.5s;
        }

        .card.unlocked .progress-label {
            color: rgba(0, 255, 0, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,0,0,0.2);
            position: relative;
            overflow: hidden;
            transition: border-color 0.5s;
        }

        .card.unlocked .progress-bar {
            border-color: rgba(0, 255, 0, 0.2);
        }

        .progress-fill {
            height: 100%;
            width: 73%;
            background: repeating-linear-gradient(90deg, #ff0000, #ff0000 8px, #cc0000 8px, #cc0000 16px);
            animation: progressMove 0.5s linear infinite;
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
            transition: background 0.5s;
        }

        .card.unlocked .progress-fill {
            background: repeating-linear-gradient(90deg, #00ff00, #00ff00 8px, #00cc00 8px, #00cc00 16px);
            box-shadow: 0 0 30px rgba(0,255,0,0.3);
            animation: none;
            width: 100%;
        }

        @keyframes progressMove {
            0% { background-position: 0 0; }
            100% { background-position: 16px 0; }
        }

        .unlock-section {
            margin: 12px 0;
        }

        .unlock-section input {
            width: 100%;
            padding: 12px 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 0, 0, 0.2);
            color: #ff0000;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s;
        }

        .unlock-section input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
        }

        .card.unlocked .unlock-section input {
            border-color: rgba(0, 255, 0, 0.2);
            color: #00ff00;
        }

        .card.unlocked .unlock-section input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        .unlock-section input::placeholder {
            color: rgba(255, 255, 255, 0.08);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 90px;
            padding: 12px 10px;
            border: 2px solid rgba(255, 0, 0, 0.3);
            background: transparent;
            color: #ff0000;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: #ff0000;
            transform: translateX(-100%);
            transition: transform 0.3s;
            z-index: -1;
        }

        .btn:hover::after {
            transform: translateX(0);
        }

        .btn:hover {
            color: #000;
            border-color: #ff0000;
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            border-color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
            color: #ff0000;
            box-shadow: 0 0 20px rgba(255,0,0,0.1);
        }

        .btn-primary:hover {
            color: #000;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
        }

        .card.unlocked .btn {
            border-color: rgba(0, 255, 0, 0.3);
            color: #00ff00;
        }

        .card.unlocked .btn::after {
            background: #00ff00;
        }

        .card.unlocked .btn-primary {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            box-shadow: 0 0 20px rgba(0,255,0,0.1);
        }

        .card.unlocked .btn-primary:hover {
            color: #000;
            box-shadow: 0 0 50px rgba(0,255,0,0.5);
        }

        .footer {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,0,0,0.05);
            font-size: 7px;
            color: rgba(255,255,255,0.08);
            font-family: 'Press Start 2P', monospace;
            letter-spacing: 2px;
        }

        .footer a {
            color: rgba(255, 0, 0, 0.2);
            text-decoration: none;
            transition: color 0.5s;
        }

        .card.unlocked .footer a {
            color: rgba(0, 255, 0, 0.2);
        }

        .footer a:hover {
            color: #ff0000;
        }

        .card.unlocked .footer a:hover {
            color: #00ff00;
        }

        @media (max-width: 480px) {
            .card { padding: 20px 15px; }
            .title { font-size: 18px; letter-spacing: 2px; }
            .skull { font-size: 55px; }
            .skull-shadow { font-size: 55px; }
            .status-item .num { font-size: 13px; }
            .message { font-size: 9px; }
            .btn { font-size: 8px; padding: 10px 8px; min-width: 70px; }
            .status-grid { gap: 4px; }
            .status-item { padding: 8px 4px; }
            .unlock-section input { font-size: 9px; padding: 10px 8px; }
        }

        @media (max-width: 360px) {
            .title { font-size: 14px; }
            .status-grid { grid-template-columns: 1fr 1fr; }
            .status-item:last-child { grid-column: span 2; }
            .btn-group { flex-direction: column; }
        }

        .burst {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }

        .burst-particle {
            position: absolute;
            font-size: 24px;
            animation: burstAnim 1s ease-out forwards;
        }

        @keyframes burstAnim {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .unlock-status {
            font-size: 8px;
            color: rgba(255, 0, 0, 0.2);
            margin-top: 8px;
            font-family: 'Press Start 2P', monospace;
            transition: color 0.5s;
            min-height: 20px;
        }

        .card.unlocked .unlock-status {
            color: rgba(0, 255, 0, 0.2);
        }
    </style>
</head>
